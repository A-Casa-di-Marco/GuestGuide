    }

    .place-category:first-of-type {
      margin-top: 24px;
    }

    .place-category-header {
      background: #fff8e8;

      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 16px;
    }

      font-size: 31px;
      margin-bottom: 4px;
    }

    .place-category-header p {
      color: var(--muted);
      font-size: 15px;
    }

      background: var(--ottanio-soft);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 80, 85, .12);
    }

      background: #fff0ec;
      border-left: 5px solid #b93a32;
    }

      display: inline-flex;
      background: #b93a32;
      color: #fff;
      border-radius: 999px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .place-card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
    }

    .place-content {
      padding: 18px;
    }

    .place-content h3 {
      font-family: 'Pacifico', cursive;
      font-size: 25px;
      color: var(--ottanio-dark);
      margin-bottom: 8px;
    }

    .place-content p {
      font-size: 15px;
      color: var(--text);
    }

    .place-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--ottanio);
      color: #fff;
      border-radius: 999px;
      padding: 10px 15px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .place-btn.light {
      background: #fff;
      color: var(--ottanio-dark);
      border: 1px solid rgba(15, 127, 131, .25);
    }

/* MOBILE: luoghi in 2 colonne + freccetta */
@media (max-width: 720px) {

    padding: 12px;

    font-size: 17px;
    line-height: 1.25;
    margin-bottom: 6px;

    font-size: 12px;

    flex-direction: column;
    gap: 7px;
  }

    width: 100%;
    font-size: 11px;
    padding: 8px 8px;

.scroll-hint {
  position: fixed;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(15, 127, 131, 0.85);
  color: #fff;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
  z-index: 999;
  box-shadow: 0 8px 18px rgba(0, 70, 75, .22);
  animation: scrollHintMove 1.4s infinite;
}

@keyframes scrollHintMove {
  0%, 100% {
    transform: translate(-50%, 0);
  }

  50% {
    transform: translate(-50%, 5px);
  }
}

@media (max-width: 720px) {
  .scroll-hint {
    display: flex;
  }
}

/* SELETTORE CATEGORIE LUOGHI */
.place-choice-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 14px;
  margin-top: 20px;
}

.place-choice {
  border: none;
  background: var(--ottanio-soft);
  border-radius: 22px;
  padding: 18px;
  text-align: left;
  font-family: 'Poppins', sans-serif;
  cursor: pointer;
  box-shadow: 0 8px 22px rgba(0,80,85,.10);
  transition: transform .18s, box-shadow .18s, background .18s;
}

.place-choice:hover,
.place-choice.active {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(0,80,85,.16);
  background: #fff8e8;
}

.place-choice span {
  display: block;
  font-size: 28px;
  margin-bottom: 8px;
}

.place-choice strong {
  display: block;
  color: var(--ottanio-dark);
  font-size: 16px;
  margin-bottom: 4px;
}

.place-choice small {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.35;
}

.place-category {
  display: none;
}

.place-category.active {
  display: block;
}

.category-top-actions {
  margin: 18px 0 0;
}

.back-to-place-categories {
  border: none;
  background: var(--ottanio);
  color: #fff;
  border-radius: 999px;
  padding: 10px 15px;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  cursor: pointer;
}

.place-card.free-beach {
  background: #e8fbf0;
  border: 2px solid rgba(32, 150, 90, .28);
}

.place-card.paid-beach {
  background: #fff3df;
  border: 2px solid rgba(218, 143, 39, .35);
}

.beach-badge {
  display: inline-flex;
  border-radius: 999px;
  padding: 5px 11px;
  font-size: 12px;
  font-weight: 800;
  margin-bottom: 8px;
}

.beach-badge.free {
  background: #20965a;
  color: #fff;
}

.beach-badge.paid {
  background: #d98b24;
  color: #fff;
}

.beach-note {
  background: #fff;
  border-left: 5px solid var(--ottanio);
  border-radius: 16px;
  padding: 12px;
  font-size: 13px;
  margin-top: 10px;
  color: var(--text);
}

@media (max-width: 720px) {

  }

      return lang;

    }

    return 'it';

    container.innerHTML = placeCategories.map(function (category) {
      var cards = category.places.map(function (place) {
        var cardClass = category.isEvents ? "place-card event-card" : "place-card";

        if (place.beachType === "free") {
          cardClass += " free-beach";
        }

        if (place.beachType === "paid") {
          cardClass += " paid-beach";
        }

        var badge = "";

        if (category.isEvents) {
          badge = '<span class="event-badge">' + labels.event[lang] + '</span>';
        }

        if (place.beachType === "free") {
          badge = '<span class="beach-badge free">' + labels.free[lang] + '</span>';
        }

        if (place.beachType === "paid") {
          badge = '<span class="beach-badge paid">' + labels.paid[lang] + '</span>';
        }

        var note = place.note ? '<div class="beach-note">' + place.note[lang] + '</div>' : "";

        return `
          <article class="${cardClass}">
            <img src="${place.image}" alt="${place.title[lang]}" onerror="this.onerror=null; this.src='assets/garden-main.jpg';">
            <div class="place-content">
              ${badge}
              <h3>${place.title[lang]}</h3>
              <p>${place.desc[lang]}</p>
              ${note}
              <div class="place-actions">
                <a class="place-btn" href="${place.infoUrl}" target="_blank">${category.isEvents ? labels.dates[lang] : labels.info[lang]}</a>
                <a class="place-btn light" href="${getMapsUrl(place)}" target="_blank">${labels.maps[lang]}</a>
              </div>
            </div>
          </article>
        `;
      }).join('');

      return `
        <div class="place-category" id="${category.id}">
          <div class="place-category-header">
            <h2>${category.title[lang]}</h2>
            <p>${category.intro[lang]}</p>
            <div class="category-top-actions">
              <button class="back-to-place-categories" type="button" onclick="hidePlaceCategories()">${labels.back[lang]}</button>
            </div>
          </div>
          <div class="places-grid">
            ${cards}
          </div>
        </div>
      `;
    }).join('');
  }

  function showPlaceCategory(categoryId) {
    document.querySelectorAll('.place-category').forEach(function (section) {
      section.classList.remove('active');
    });

    document.querySelectorAll('.place-choice').forEach(function (button) {
      button.classList.remove('active');
    });

    var selected = document.getElementById(categoryId);

    if (selected) {
      selected.classList.add('active');
    }

    var buttons = document.querySelectorAll('.place-choice');
    placeCategories.forEach(function (category, index) {
      if (category.id === categoryId && buttons[index]) {
        buttons[index].classList.add('active');
      }
    });

    setTimeout(function () {
      if (selected) {
        selected.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 80);
  }

  function hidePlaceCategories() {
    document.querySelectorAll('.place-category').forEach(function (section) {
      section.classList.remove('active');
    });

    document.querySelectorAll('.place-choice').forEach(function (button) {
      button.classList.remove('active');
    });

    var top = document.getElementById('place-choice-grid');

    if (top) {
      top.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function translatePage(lang) {
    document.documentElement.lang = lang;

    document.querySelectorAll('[data-it], [data-it-html]').forEach(function (el) {
      var htmlTranslation = el.getAttribute('data-' + lang + '-html');
      var textTranslation = el.getAttribute('data-' + lang);

      if (htmlTranslation) {
        el.innerHTML = htmlTranslation;
      } else if (textTranslation) {
        el.textContent = textTranslation;
      }
    });

    var home = document.querySelector('.back-home');
    if (home) {
      home.href = 'index.html#' + lang;
    }

    renderPlaceChoiceButtons(lang);
    renderPlaces(lang);

    try {
      localStorage.setItem('guestGuideLang', lang);
    } catch (e) {}
  }

  translatePage(getLang());
</script>

<script>
  const scrollHint = document.getElementById('scrollHint');

  function updateScrollHint() {
    if (!scrollHint) return;

    const scrollPosition = window.scrollY + window.innerHeight;
    const pageHeight = document.documentElement.scrollHeight;

    if (pageHeight - scrollPosition < 120) {
      scrollHint.style.display = 'none';
    } else {
      scrollHint.style.display = window.innerWidth <= 720 ? 'flex' : 'none';
    }
  }

  window.addEventListener('scroll', updateScrollHint);
  window.addEventListener('resize', updateScrollHint);
  window.addEventListener('load', updateScrollHint);
</script>
</body>
</html>
