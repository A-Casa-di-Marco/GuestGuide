<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="theme-color" content="#0f7f83">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Casa di Marco">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --ottanio:#0f7f83;
      --ottanio-dark:#075f63;
      --ottanio-soft:#dff3f2;
      --white:#fff;
      --milk:#fbfbf8;
      --text:#263238;
      --muted:#6f7d80;
      --shadow:0 18px 50px rgba(0,70,75,.20);
      --radius:28px;
    }

    * {
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body {
      background:var(--milk);
      color:var(--text);
      font-family:'Poppins',sans-serif;
      line-height:1.65;
    }

    h1,h2,h3 {
      font-family:'Pacifico',cursive;
      font-weight:400;
      color:var(--ottanio-dark);
    }

    .page-hero {
      min-height:38vh;
      background:
        linear-gradient(180deg, rgba(0,80,85,.25), rgba(0,80,85,.55)),
        url("assets/garden-main.jpg") center/cover no-repeat;
      color:#fff;
      display:flex;
      align-items:flex-end;
      padding:38px 20px;
    }

    .page-hero div {
      max-width:1000px;
      margin:0 auto;
      width:100%;
    }

    .page-hero h1 {
      color:#fff;
      font-size:clamp(38px, 7vw, 68px);
      text-shadow:0 5px 20px rgba(0,0,0,.35);
    }

    main {
      max-width:1000px;
      margin:0 auto;
      padding:28px 16px 60px;
    }

    section {
      background:#fff;
      border-radius:28px;
      padding:28px;
      box-shadow:var(--shadow);
      margin-bottom:22px;
    }

    .back-home {
      display:inline-flex;
      margin-bottom:18px;
      background:var(--ottanio);
      color:#fff;
      text-decoration:none;
      border-radius:999px;
      padding:11px 18px;
      font-weight:600;
    }

    .food-choice-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
      gap:14px;
      margin-top:18px;
    }

    .food-choice {
      border:none;
      background:var(--ottanio-soft);
      border-radius:22px;
      padding:18px;
      text-align:left;
      font-family:'Poppins', sans-serif;
      cursor:pointer;
      box-shadow:0 8px 22px rgba(0,80,85,.10);
      transition:transform .18s, box-shadow .18s;
    }

    .food-choice:hover {
      transform:translateY(-2px);
      box-shadow:0 12px 28px rgba(0,80,85,.16);
    }

    .food-choice span {
      display:block;
      font-size:28px;
      margin-bottom:8px;
    }

    .food-choice strong {
      display:block;
      color:var(--ottanio-dark);
      font-size:16px;
      margin-bottom:4px;
    }

    .food-choice small {
      color:var(--muted);
      font-size:13px;
    }

    .food-category {
      display:none;
    }

    .food-category.active {
      display:block;
    }

    .category-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }

    .back-category {
      border:none;
      background:var(--ottanio);
      color:#fff;
      border-radius:999px;
      padding:10px 15px;
      font-family:'Poppins', sans-serif;
      font-weight:600;
      cursor:pointer;
    }

    .restaurant-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
      gap:18px;
    }

    .restaurant-card {
      background:var(--ottanio-soft);
      border-radius:24px;
      position:relative;
      overflow:hidden;
      box-shadow:0 10px 28px rgba(0,80,85,.12);
    }

    .recommended-ribbon {
      position:absolute;
      top:14px;
      left:14px;
      z-index:2;
      background:var(--ottanio);
      color:#fff;
      border-radius:999px;
      padding:7px 13px;
      font-size:12px;
      font-weight:800;
      box-shadow:0 8px 22px rgba(0,0,0,.22);
    }

    .restaurant-card.featured {
      background:#fff8e8;
      border:2px solid rgba(15,127,131,.35);
      box-shadow:0 14px 34px rgba(0,80,85,.18);
    }

    .restaurant-card img {
      width:100%;
      height:190px;
      object-fit:cover;
      display:block;
    }

    .restaurant-content {
      padding:18px;
    }

    .restaurant-content h3 {
      font-size:25px;
      margin-bottom:8px;
    }

    .restaurant-content p {
      font-size:15px;
      margin-bottom:10px;
    }

    .badge-row {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      margin-bottom:10px;
    }

    .walk-badge {
      display:inline-flex;
      align-items:center;
      background:var(--ottanio);
      color:#fff;
      border-radius:999px;
      padding:6px 12px;
      font-size:12px;
      font-weight:700;
    }

    .price-badge {
      display:inline-flex;
      align-items:center;
      gap:6px;
      background:#fff;
      color:var(--ottanio-dark);
      border:1px solid rgba(15,127,131,.25);
      border-radius:999px;
      padding:6px 12px;
      font-size:12px;
      font-weight:700;
    }

    .price-badge .price-symbol {
      letter-spacing:.5px;
    }

    .recommended-badge {
      display:inline-flex;
      align-items:center;
      background:var(--ottanio);
      color:#fff;
      border-radius:999px;
      padding:6px 12px;
      font-size:12px;
      font-weight:700;
    }

    .tip-box {
      background:#fff;
      border-left:5px solid var(--ottanio);
      border-radius:16px;
      padding:12px;
      font-size:14px;
      margin-top:10px;
    }

    .restaurant-actions {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .restaurant-btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:var(--ottanio);
      color:#fff;
      border-radius:999px;
      padding:10px 15px;
      font-size:13px;
      font-weight:600;
      text-decoration:none;
    }

    .restaurant-btn.light {
      background:#fff;
      color:var(--ottanio-dark);
      border:1px solid rgba(15,127,131,.25);
    }

    @media (max-width:720px) {
      body {
        font-size:14px;
        line-height:1.55;
      }

      .page-hero {
        min-height:26vh;
        padding:26px 16px;
      }

      .page-hero h1 {
        font-size:34px;
        line-height:1.15;
      }

      main {
        padding:18px 12px 44px;
      }

      section {
        padding:18px;
        border-radius:22px;
      }

      h2 {
        font-size:26px;
      }

      .food-choice-grid {
        grid-template-columns:1fr;
      }

      .category-header {
        align-items:flex-start;
        flex-direction:column;
      }

      .restaurant-grid {
        grid-template-columns:1fr;
      }

      .restaurant-card img {
        height:175px;
      }

      .restaurant-content {
        padding:15px;
      }

      .restaurant-content h3 {
        font-size:23px;
      }

      .restaurant-content p,
      .tip-box {
        font-size:14px;
      }

      .restaurant-actions {
        flex-direction:column;
      }

      .restaurant-btn,
      .back-category {
        width:100%;
        text-align:center;
      }
    }
  
/* MOBILE: categorie e ristoranti in 2 colonne + freccetta */
@media (max-width: 720px) {
  .food-choice-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 10px;
  }

  .food-choice {
    padding: 13px 10px;
    border-radius: 18px;
    text-align: center;
  }

  .food-choice span {
    font-size: 23px;
    margin-bottom: 5px;
  }

  .food-choice strong {
    font-size: 13px;
    line-height: 1.25;
  }

  .food-choice small {
    font-size: 11px;
    line-height: 1.25;
  }

  .restaurant-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 10px;
  }

  .restaurant-card {
    border-radius: 18px;
    overflow: hidden;
  }

  .restaurant-card img {
    height: 110px !important;
    object-fit: cover;
  }

  .restaurant-content {
    padding: 12px;
  }

  .restaurant-content h3 {
    font-size: 17px;
    line-height: 1.25;
    margin-bottom: 6px;
  }

  .restaurant-content p,
  .tip-box {
    font-size: 12px;
    line-height: 1.4;
  }

  .badge-row {
    gap: 5px;
  }

  .walk-badge,
  .price-badge,
  .recommended-badge {
    font-size: 10px;
    padding: 5px 8px;
  }

  .restaurant-actions {
    flex-direction: column;
    gap: 7px;
  }

  .restaurant-btn {
    width: 100%;
    font-size: 11px;
    padding: 8px 8px;
  }

  .back-category {
    width: 100%;
    font-size: 13px;
  }
}

.scroll-hint {
  position: fixed;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(15, 127, 131, 0.85);
  color: #fff;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
  z-index: 999;
  box-shadow: 0 8px 18px rgba(0, 70, 75, .22);
  animation: scrollHintMove 1.4s infinite;
}

@keyframes scrollHintMove {
  0%, 100% {
    transform: translate(-50%, 0);
  }

  50% {
    transform: translate(-50%, 5px);
  }
}

@media (max-width: 720px) {
  .scroll-hint {
    display: flex;
  }
}
</style>

    function getLang() {
      var params = new URLSearchParams(window.location.search);
      var lang = params.get('lang');

      if (lang === 'it' || lang === 'en' || lang === 'es' || lang === 'fr') return lang;

      try {
        lang = localStorage.getItem('guestGuideLang');
      } catch (e) {}

      if (lang === 'it' || lang === 'en' || lang === 'es' || lang === 'fr') return lang;

      return 'it';
    }

    function translatePage(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;

      document.querySelectorAll('[data-it], [data-it-html]').forEach(function (el) {
        var htmlTranslation = el.getAttribute('data-' + lang + '-html');
        var textTranslation = el.getAttribute('data-' + lang);

        if (htmlTranslation) {
          el.innerHTML = htmlTranslation;
        } else if (textTranslation) {
          el.textContent = textTranslation;
        }
      });

      var home = document.querySelector('.back-home');
      if (home) {
        home.href = 'index.html#' + lang;
      }

      try {
        localStorage.setItem('guestGuideLang', lang);
      } catch (e) {}
    }

    function renderCategory(categoryKey) {
      var category = categories[categoryKey];
      var grid = document.getElementById('restaurant-grid');
      var title = document.getElementById('category-title');

      if (!category || !grid || !title) return;

      title.textContent = category.title[currentLang];

      var sortedRestaurants = category.restaurants.slice().sort(function(a, b) {
        return (b.recommended === true) - (a.recommended === true);
      });

      grid.innerHTML = sortedRestaurants.map(function (place) {
        var mapsUrl = place.mapsUrl || "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(place.mapsQuery);

        return `
          <article class="restaurant-card ${place.featured ? 'featured' : ''}">
            ${place.recommended ? `<div class="recommended-ribbon">${labels.recommended[currentLang]}</div>` : ''}
            <img src="${place.image}" alt="${place.name[currentLang]}">
            <div class="restaurant-content">
              <div class="badge-row">
                ${place.recommended ? `<div class="recommended-badge">${labels.recommended[currentLang]}</div>` : ''}
                ${place.walkable ? `<div class="walk-badge">${labels.walkable[currentLang]}</div>` : ''}
                ${place.price ? `<div class="price-badge" title="${labels.price[currentLang]}"><span class="price-symbol">${place.price}</span></div>` : ''}
              </div>
              <h3>${place.name[currentLang]}</h3>
              <p>${place.desc[currentLang]}</p>

              <div class="tip-box">
                <strong>${labels.tip[currentLang]}:</strong>
                ${place.tip[currentLang]}
              </div>

              <div class="restaurant-actions">
                <a class="restaurant-btn light" href="${mapsUrl}" target="_blank">
                  ${labels.maps[currentLang]}
                </a>
              </div>
            </div>
          </article>
        `;
      }).join('');

      document.getElementById('food-start').style.display = 'none';
      document.getElementById('food-category').classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showCategory(categoryKey) {
      renderCategory(categoryKey);

      var newUrl = new URL(window.location.href);
      newUrl.searchParams.set('cat', categoryKey);

      history.pushState(
        { category: categoryKey },
        '',
        newUrl.pathname + '?' + newUrl.searchParams.toString()
      );
    }

    function renderCategoriesStart() {
      document.getElementById('food-category').classList.remove('active');
      document.getElementById('food-start').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function hideCategory() {
      renderCategoriesStart();

      var newUrl = new URL(window.location.href);
      newUrl.searchParams.delete('cat');

      history.pushState(
        { category: null },
        '',
        newUrl.pathname + '?' + newUrl.searchParams.toString()
      );
    }

    translatePage(getLang());

    (function initCategoryFromUrl() {
      var params = new URLSearchParams(window.location.search);
      var category = params.get('cat');

      history.replaceState(
        { category: category || null },
        '',
        window.location.href
      );

      if (category && categories[category]) {
        renderCategory(category);
      } else {
        renderCategoriesStart();
      }
    })();

    window.addEventListener('popstate', function () {
      var params = new URLSearchParams(window.location.search);
      var category = params.get('cat');

      if (category && categories[category]) {
        renderCategory(category);
      } else {
        renderCategoriesStart();
      }
    });
  </script>

<script>
  const scrollHint = document.getElementById('scrollHint');

  function updateScrollHint() {
    if (!scrollHint) return;

    const scrollPosition = window.scrollY + window.innerHeight;
    const pageHeight = document.documentElement.scrollHeight;

    if (pageHeight - scrollPosition < 120) {
      scrollHint.style.display = 'none';
    } else {
      scrollHint.style.display = window.innerWidth <= 720 ? 'flex' : 'none';
    }
  }

  window.addEventListener('scroll', updateScrollHint);
  window.addEventListener('resize', updateScrollHint);
  window.addEventListener('load', updateScrollHint);
</script>
</body>
</html>
